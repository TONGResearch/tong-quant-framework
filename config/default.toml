[project]
name = "Tong Quant Framework"
environment = "research"
base_currency = "CNY"

[data]
provider = "akshare"
storage_root = "data"
database_path = "data/tong_quant.sqlite3"
cache_root = "data/cache"
cache_ttl_seconds = 86400
strict_point_in_time = true
default_adjustment = "none"

[provider_calibration]
enabled = false
primary_provider = "akshare"
secondary_provider = "tushare"
fail_on_high_severity_conflict = true

[market]
enabled = ["china_a"]
default = "china_a"

[market_regime]
enabled = true

[market_regime.china]
bull_threshold = 25.0
bear_threshold = -25.0
transition_bull_threshold = 12.0
transition_bear_threshold = -12.0
transition_min_agreement = 0.60
model_version = "china-v0.3"

[market_regime.china.weights]
csi_300_trend = 0.25
csi_all_share_trend = 0.20
rising_stocks = 0.20
market_turnover = 0.15
market_breadth = 0.20

[market_regime.global]
bull_threshold = 25.0
bear_threshold = -25.0
transition_bull_threshold = 12.0
transition_bear_threshold = -12.0
transition_min_agreement = 0.60
model_version = "global-v0.3"

[market_regime.global.weights]
major_index_trend = 0.35
market_breadth = 0.25
volatility = 0.20
relative_strength = 0.20

[screening]
enabled = true

[screening.research_score]
model_version = "research-score-v0.4"
maximum_component_weight = 0.35
require_all_components = true

[screening.research_score.weights]
news = 0.15
industry = 0.20
survival = 0.15
growth = 0.15
valuation = 0.10
positioning = 0.10
macro = 0.15

[screening.research_queue]
research_weight = 0.65
urgency_weight = 0.25
confidence_weight = 0.10

[research]
enabled = true
model_version = "research-engine-v0.5"

[research.investment_score]
model_version = "investment-score-v0.6.1"
maximum_component_weight = 0.35
require_all_components = false

[research.investment_score.weights]
policy = 0.08
financial = 0.12
industry = 0.12
value = 0.15
technical = 0.10
trend = 0.10
pattern = 0.08
market_regime = 0.25

[research.technical]
short_ma_period = 50
long_ma_period = 200
position_period = 252

[research.trend]
breakout_period = 20
volume_period = 20
atr_period = 14
confirmation_threshold = 60.0

[research.pattern]
rising_stocks_threshold = 3000
volume_period = 20

[portfolio]
enabled = true
model_version = "portfolio-proposal-v0.7"
base_currency = "CNY"
minimum_cash_weight = 0.05
maximum_single_position_weight = 0.10
target_volatility = 0.15

[risk]
max_position_weight = 0.10
max_sector_weight = 0.30
max_portfolio_drawdown = 0.15
risk_per_trade = 0.01
total_risk_budget = 0.12
per_position_risk_budget = 0.03
per_sector_risk_budget = 0.06
per_theme_risk_budget = 0.05
maximum_country_weight = 0.60
maximum_theme_weight = 0.35
minimum_liquidity_score = 60.0
maximum_average_correlation = 0.70
stress_loss_limit = 0.12

[notifications]
mode = "disabled"
max_attempts = 3
batch_size = 100
lease_timeout_seconds = 300
retry_delay_seconds = 300

[execution]
mode = "disabled"
allow_live_orders = false
require_manual_approval = true
broker = "paper"

[validation]
enabled = true
model_version = "validation-engine-v0.6"
minimum_observations = 500
require_out_of_sample = true
require_walk_forward = true
fail_on_integrity_error = true

[validation.splits]
training_days = 1095
validation_days = 365
step_days = 180
embargo_days = 20

[validation.robustness]
minimum_windows = 3
maximum_missing_rate = 0.10

[validation.portfolio]
maximum_category_weight = 0.35
maximum_hhi = 0.25
